<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Muestrario de Diseños{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <h1 class="logo">Muestrario</h1>
            <nav class="nav">
                <a href="{% url 'muestras:galeria' %}">Galería</a>
                <a href="{% url 'muestras:contacto' %}" class="nav-contacto">Contacto</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% if messages %}
            <div class="messages-container">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Muestrario de Diseños. Todos los derechos reservados.</p>
        </div>
    </footer>
</body>
</html>
